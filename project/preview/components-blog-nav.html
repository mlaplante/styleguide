<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#f8f9fa;font-family:var(--lp-font-display);color:var(--lp-ink-900)}
  .wrap{height:100%;display:flex;flex-direction:column}
  .nav{background:linear-gradient(135deg,#2980b9 0%,#1a6da3 100%);padding:18px 28px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.15)}
  .brand,.link{color:#fff;font-family:var(--lp-font-mono);font-size:14px;letter-spacing:1px;text-transform:lowercase;text-decoration:none}
  .brand{font-weight:700;letter-spacing:1.5px}
  .links{display:flex;gap:24px}
  .progress{height:3px;background:#60a5fa;width:38%}
  .body-pad{flex:1;padding:16px 28px;display:flex;align-items:center}
  .stat{font-family:var(--lp-font-mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#9ca3af}
</style></head>
<body>
<div class="wrap">
  <div class="nav">
    <a class="brand">Michael LaPlante</a>
    <div class="links"><a class="link">blog</a><a class="link">about</a><a class="link">contact</a></div>
  </div>
  <div class="progress"></div>
  <div class="body-pad"><div class="stat">Sticky blog nav · reading progress bar (scroll-timeline)</div></div>
</div>
</body></html>
