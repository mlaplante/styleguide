<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--lp-font-display);color:var(--lp-fg-1)}
  .wrap{padding:18px;display:grid;grid-template-columns:1fr 1fr;gap:12px;height:100%;box-sizing:border-box}
  .tile{border-radius:10px;display:flex;align-items:center;justify-content:center;padding:22px}
  .tile.light{background:#F1F1F1}
  .tile.dark{background:#202020}
  .tile img{max-width:100%;max-height:110px;object-fit:contain}
</style></head>
<body>
  <div class="wrap">
    <div class="tile light"><img src="../assets/laplante-logo.png" alt="La Plante Web Development"></div>
    <div class="tile dark"><img src="../assets/laplante-logo-white.png" alt="La Plante Web Development (reverse)"></div>
  </div>
</body></html>
