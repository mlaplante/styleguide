<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--lp-font-mono);color:var(--lp-fg-1)}
  .wrap{padding:20px;display:grid;grid-template-columns:repeat(6,1fr);gap:8px;height:100%;box-sizing:border-box}
  .sw{border-radius:8px;padding:10px 12px;display:flex;flex-direction:column;justify-content:space-between;min-height:118px;box-sizing:border-box;font-size:10px;color:#fff}
  .sw .name{font-weight:700;font-size:11px;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:2px}
  .sw .role{font-family:var(--lp-font-display);font-weight:500;font-size:10px;opacity:.9}
  .sw .hex{opacity:.85}
</style></head>
<body>
  <div class="wrap">
    <div class="sw" style="background:#607D8B"><div><div class="name">Blue-Grey</div><div class="role">Accent opt-in</div></div><div class="hex">#607D8B</div></div>
    <div class="sw" style="background:#009688"><div><div class="name">Teal</div><div class="role">Accent opt-in</div></div><div class="hex">#009688</div></div>
    <div class="sw" style="background:#FF4081"><div><div class="name">Pink</div><div class="role">Accent opt-in</div></div><div class="hex">#FF4081</div></div>
    <div class="sw" style="background:#2196F3"><div><div class="name">Blue</div><div class="role">Accent opt-in</div></div><div class="hex">#2196F3</div></div>
    <div class="sw" style="background:#4CAF50"><div><div class="name">Green</div><div class="role">Accent opt-in</div></div><div class="hex">#4CAF50</div></div>
    <div class="sw" style="background:#9C27B0"><div><div class="name">Purple</div><div class="role">Accent opt-in</div></div><div class="hex">#9C27B0</div></div>
  </div>
</body></html>
