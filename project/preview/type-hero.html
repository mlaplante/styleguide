<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#F1F1F1;font-family:var(--lp-font-display);color:var(--lp-ink-900)}
  .wrap{padding:28px 30px;height:100%;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center}
  .hero{color:#fff;background:#3F51B5;padding:28px 32px;border-radius:10px;box-shadow:0 0 40px 0 rgba(0,0,0,.25)}
  h1{font-size:54px;font-weight:300;line-height:1em;letter-spacing:2px;margin:0}
  h1 strong{font-weight:300}
  .tag{font-family:var(--lp-font-mono);font-size:16px;font-weight:300;color:rgba(255,255,255,.6);margin-top:8px;letter-spacing:1px}
  .label{font-family:var(--lp-font-mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:12px}
</style></head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="label">Hero · Poppins 300 / 54–68px</div>
      <h1>I am <strong>Michael<br>La Plante</strong></h1>
      <div class="tag">SVP of Information Security and Operations</div>
    </div>
  </div>
</body></html>
