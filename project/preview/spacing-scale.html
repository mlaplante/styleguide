<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--lp-font-display);color:var(--lp-ink-900)}
  .wrap{padding:24px 30px;height:100%;box-sizing:border-box;display:flex;align-items:center;justify-content:space-around;gap:10px;flex-wrap:wrap}
  .stack{display:flex;flex-direction:column;align-items:center;gap:8px}
  .bar{background:#3F51B5;height:10px;border-radius:2px}
  .meta{font-family:var(--lp-font-mono);font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:#6b7280}
  .meta small{display:block;color:#9ca3af;font-weight:400;font-size:10px;letter-spacing:.3px;text-transform:none;margin-top:2px}
</style></head>
<body>
<div class="wrap">
  <div class="stack"><div class="bar" style="width:4px"></div><div class="meta">1<small>4 px</small></div></div>
  <div class="stack"><div class="bar" style="width:8px"></div><div class="meta">2<small>8 px</small></div></div>
  <div class="stack"><div class="bar" style="width:16px"></div><div class="meta">4<small>16 px</small></div></div>
  <div class="stack"><div class="bar" style="width:24px"></div><div class="meta">6<small>24 px</small></div></div>
  <div class="stack"><div class="bar" style="width:40px"></div><div class="meta">10<small>40 px</small></div></div>
  <div class="stack"><div class="bar" style="width:72px"></div><div class="meta">18<small>72 px</small></div></div>
  <div class="stack"><div class="bar" style="width:90px"></div><div class="meta">22<small>90 px · section</small></div></div>
  <div class="stack"><div class="bar" style="width:120px"></div><div class="meta">30<small>120 px · hero</small></div></div>
</div>
</body></html>
