<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--lp-font-mono);color:var(--lp-fg-1)}
  .wrap{padding:20px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;height:100%;box-sizing:border-box}
  .sw{border-radius:10px;padding:12px 14px;display:flex;flex-direction:column;justify-content:space-between;min-height:120px;box-sizing:border-box;font-size:10px;letter-spacing:0.5px}
  .sw .name{font-weight:700;font-size:11px;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:2px}
  .sw .hex{font-family:var(--lp-font-mono);opacity:.85}
  .sw .role{font-family:var(--lp-font-display);font-weight:500;font-size:11px;opacity:.85}
</style></head>
<body>
  <div class="wrap">
    <div class="sw" style="background:#3F51B5;color:#fff">
      <div><div class="name">Indigo 500</div><div class="role">Primary / Hero</div></div>
      <div class="hex">#3F51B5</div>
    </div>
    <div class="sw" style="background:#3849a1;color:#fff">
      <div><div class="name">Indigo 600</div><div class="role">Hover</div></div>
      <div class="hex">#3849A1</div>
    </div>
    <div class="sw" style="background:#303f8c;color:#fff">
      <div><div class="name">Indigo 700</div><div class="role">Pressed</div></div>
      <div class="hex">#303F8C</div>
    </div>
    <div class="sw" style="background:rgba(63,81,181,0.1);color:#3F51B5;border:1px solid rgba(63,81,181,0.2)">
      <div><div class="name">Indigo 10%</div><div class="role">Eyebrow wash</div></div>
      <div class="hex">rgba(63,81,181,.1)</div>
    </div>

    <div class="sw" style="background:#2980b9;color:#fff">
      <div><div class="name">Blog 500</div><div class="role">Blog nav start</div></div>
      <div class="hex">#2980B9</div>
    </div>
    <div class="sw" style="background:#1a6da3;color:#fff">
      <div><div class="name">Blog 600</div><div class="role">Blog nav end</div></div>
      <div class="hex">#1A6DA3</div>
    </div>
    <div class="sw" style="background:#1a5276;color:#fff">
      <div><div class="name">Blog 700</div><div class="role">Dark nav</div></div>
      <div class="hex">#1A5276</div>
    </div>
    <div class="sw" style="background:#60a5fa;color:#0f172a">
      <div><div class="name">Link Dark</div><div class="role">Dark-mode link</div></div>
      <div class="hex">#60A5FA</div>
    </div>
  </div>
</body></html>
