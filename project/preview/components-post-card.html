<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#f8f9fa;font-family:var(--lp-font-display);color:var(--lp-ink-900)}
  .wrap{padding:28px;height:100%;box-sizing:border-box;display:flex;align-items:center;justify-content:center}
  .card{display:block;padding:20px 24px;background:#fff;border:1px solid #e5e7eb;border-radius:10px;text-decoration:none;transition:all .2s;max-width:460px;width:100%;box-shadow:0 4px 16px rgba(0,0,0,.06)}
  .date{font-size:12px;color:#9ca3af}
  .sep{color:#d1d5db;margin:0 4px}
  h4{font-size:16px;font-weight:600;color:#111827;margin:8px 0 6px;line-height:1.35}
  p{font-size:13px;color:#6b7280;margin:0;line-height:1.5}
  .cat{display:inline-block;background:rgba(41,128,185,.08);color:#2980b9;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:500;margin-right:8px}
</style></head>
<body>
<div class="wrap">
  <a class="card">
    <span class="cat">dev-session</span>
    <span class="date">Apr 16, 2026<span class="sep">·</span>7 min read</span>
    <h4>Netlify to Cloudflare Workers contact form</h4>
    <p>Migrating the portfolio's contact form off Netlify Functions and onto a Cloudflare Worker — with Turnstile, rate-limiting, and zero Netlify-specific code left behind.</p>
  </a>
</div>
</body></html>
