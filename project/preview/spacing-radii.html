<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--lp-font-display);color:var(--lp-ink-900)}
  .wrap{padding:28px 32px;height:100%;box-sizing:border-box;display:flex;align-items:center;justify-content:space-around;gap:14px}
  .stack{display:flex;flex-direction:column;align-items:center;gap:10px}
  .box{width:68px;height:68px;background:#3F51B5}
  .meta{font-family:var(--lp-font-mono);font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:#6b7280;text-align:center}
  .meta small{display:block;color:#9ca3af;font-weight:400;font-size:10px;letter-spacing:.3px;text-transform:none;margin-top:2px}
</style></head>
<body>
<div class="wrap">
  <div class="stack"><div class="box" style="border-radius:3px"></div><div class="meta">sm<small>3px · alerts</small></div></div>
  <div class="stack"><div class="box" style="border-radius:4px"></div><div class="meta">base<small>4px · menu</small></div></div>
  <div class="stack"><div class="box" style="border-radius:6px"></div><div class="meta">md<small>6px · CTA</small></div></div>
  <div class="stack"><div class="box" style="border-radius:8px"></div><div class="meta">lg<small>8px · code / img</small></div></div>
  <div class="stack"><div class="box" style="border-radius:10px"></div><div class="meta">xl<small>10px · cards</small></div></div>
  <div class="stack"><div class="box" style="width:120px;border-radius:100px"></div><div class="meta">pill<small>100px · tags</small></div></div>
  <div class="stack"><div class="box" style="border-radius:50%"></div><div class="meta">full<small>50% · avatar</small></div></div>
</div>
</body></html>
