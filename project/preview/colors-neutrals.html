<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--lp-font-mono);color:var(--lp-fg-1)}
  .wrap{padding:20px;display:grid;grid-template-columns:repeat(6,1fr);gap:8px;height:100%;box-sizing:border-box}
  .sw{border-radius:8px;padding:10px 12px;display:flex;flex-direction:column;justify-content:space-between;min-height:118px;box-sizing:border-box;font-size:10px}
  .sw .name{font-weight:700;font-size:10px;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:2px}
  .sw .hex{opacity:.85}
  .sw.l{border:1px solid #e5e7eb}
</style></head>
<body>
  <div class="wrap">
    <div class="sw" style="background:#111827;color:#fff"><div><div class="name">Ink 900</div></div><div class="hex">#111827</div></div>
    <div class="sw" style="background:#1a1a1a;color:#fff"><div><div class="name">Ink 800</div></div><div class="hex">#1A1A1A</div></div>
    <div class="sw" style="background:#202020;color:#fff"><div><div class="name">Ink 600</div></div><div class="hex">#202020</div></div>
    <div class="sw" style="background:#374151;color:#fff"><div><div class="name">Ink 500</div></div><div class="hex">#374151</div></div>
    <div class="sw" style="background:#6b7280;color:#fff"><div><div class="name">Ink 300</div></div><div class="hex">#6B7280</div></div>
    <div class="sw" style="background:#9ca3af;color:#fff"><div><div class="name">Ink 100</div></div><div class="hex">#9CA3AF</div></div>

    <div class="sw l" style="background:#E0E0E0"><div><div class="name">Line</div></div><div class="hex">#E0E0E0</div></div>
    <div class="sw l" style="background:#e5e7eb"><div><div class="name">Line 2</div></div><div class="hex">#E5E7EB</div></div>
    <div class="sw l" style="background:#F0F0F0"><div><div class="name">Paper 3</div></div><div class="hex">#F0F0F0</div></div>
    <div class="sw l" style="background:#F1F1F1"><div><div class="name">Paper</div></div><div class="hex">#F1F1F1</div></div>
    <div class="sw l" style="background:#f8f9fa"><div><div class="name">Paper 2</div></div><div class="hex">#F8F9FA</div></div>
    <div class="sw l" style="background:#fff"><div><div class="name">White</div></div><div class="hex">#FFFFFF</div></div>
  </div>
</body></html>
