<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>La Plante Web Development — Portfolio UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="portfolio.css">
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="Primary.jsx"></script>
  <script type="text/babel" src="Secondary.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [dark, setDark] = useState(false);
      const [open, setOpen] = useState(false);
      useEffect(() => {
        document.body.classList.toggle('p-dark', dark);
      }, [dark]);
      return (
        <React.Fragment>
          <Nav dark={dark} onToggleDark={() => setDark(v => !v)} open={open} onToggle={() => setOpen(v => !v)} />
          <main>
            <Hero />
            <About />
            <Funfacts />
            <Services />
            <Timeline />
            <Contact />
          </main>
          <Footer />
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
