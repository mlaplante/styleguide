name: Update dependencies

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Update all packages to latest
        run: |
          npx npm-check-updates --upgrade
          npm install

      - name: Verify build
        run: npm run build

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: deps/weekly-update
          commit-message: "chore(deps): update all packages to latest"
          title: "chore(deps): weekly dependency update"
          body: |
            Automated weekly dependency update.

            All packages were bumped to their latest versions with `npm-check-updates`, and `npm run build` passed.
          labels: dependencies
          delete-branch: true
